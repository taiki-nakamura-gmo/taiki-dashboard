<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EFE9;--surface:#FFFFFF;--surface2:#EFEDE6;
  --border:#E2DFD6;--border2:#C9C6BC;
  --text:#18171A;--text2:#5C5A62;--text3:#9B99A4;
  --accent:#3A5EE5;--accent-bg:#EDF0FC;
  --green:#1A7A50;--green-bg:#E8F5EE;
  --amber:#A05C00;--amber-bg:#FEF4E3;
  --red:#C0253A;--red-bg:#FDEAED;
  --purple:#6B35C8;
  --r8:8px;--r12:12px;--r16:16px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.05);
  --font:"Instrument Sans",sans-serif;--mono:"DM Mono",monospace;
  --cn:#3A5EE5;--cm:#1A7A50;--cs:#C0253A;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;background:var(--accent);border-radius:var(--r8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r8);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .14s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:none;color:var(--red);border:1px solid #f5c6cc}.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn svg{width:13px;height:13px}
.stats-bar{padding:10px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text2)}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-num{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--text)}
.stats-sep{width:1px;height:16px;background:var(--border)}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:14px 20px;align-items:start}
.col{background:var(--surface2);border-radius:var(--r16);overflow:hidden;border:1px solid var(--border)}
.col-header{padding:13px 14px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid transparent}
.col-nakamura .col-header{border-color:var(--cn);background:linear-gradient(135deg,#EDF0FC,#f5f7ff)}
.col-naka .col-header{border-color:var(--cm);background:linear-gradient(135deg,#E8F5EE,#f0faf4)}
.col-sakurai .col-header{border-color:var(--cs);background:linear-gradient(135deg,#FDEAED,#fff5f6)}
.col-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.col-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.col-count{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:600}
.col-nakamura .col-count{background:#c7d7ff;color:var(--cn)}
.col-naka .col-count{background:#a7f3d0;color:var(--cm)}
.col-sakurai .col-count{background:#fecdd3;color:var(--cs)}
.col-body{padding:10px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.col-empty{padding:24px 10px;text-align:center;color:var(--text3);font-size:12.5px}
.sort-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text3);transition:all .12s;white-space:nowrap}
.sort-btn:hover{border-color:var(--border2);color:var(--text2)}
.sort-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.col-sort-bar{display:flex;gap:4px;padding:6px 10px 2px;flex-wrap:wrap}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;transition:box-shadow .14s,transform .14s;cursor:pointer;position:relative}
.task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.task-card.completing{opacity:0;transform:translateX(16px) scale(.97);transition:all .32s ease;pointer-events:none}
.pri-bar{height:3px;width:100%}
.pb-high{background:var(--red)}.pb-mid{background:var(--amber)}.pb-low{background:var(--green)}.pb-none{background:var(--border)}
.card-inner{padding:10px 12px}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.card-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s;margin-top:1px;background:none;cursor:pointer}
.card-check:hover{border-color:var(--green);background:var(--green-bg)}
.card-check.checked{background:var(--green);border-color:var(--green);animation:ck .2s ease}
@keyframes ck{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.ck-svg{width:9px;height:9px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.card-check.checked .ck-svg{display:block}
.card-name{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.card-memo{font-size:11.5px;color:var(--text2);margin-bottom:6px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:500}
.tag-ph{background:var(--red-bg);color:var(--red)}.tag-pm{background:var(--amber-bg);color:var(--amber)}.tag-pl{background:var(--green-bg);color:var(--green)}
.tag-due{background:var(--surface2);color:var(--text2)}.tag-due.overdue{background:var(--red-bg);color:var(--red)}.tag-due.today{background:var(--amber-bg);color:var(--amber)}
.card-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .13s}
.task-card:hover .card-actions{opacity:1}
.icon-btn{width:24px;height:24px;border-radius:var(--r8);border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .12s}
.icon-btn:hover{background:var(--border);color:var(--text2)}
.icon-btn.del:hover{background:var(--red-bg);color:var(--red)}
.icon-btn svg{width:12px;height:12px}
.trash-view{padding:16px 20px}
.trash-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:11px 14px;display:flex;align-items:center;gap:11px;margin-bottom:6px}
.trash-name{flex:1;font-size:13px;color:var(--text2);text-decoration:line-through;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trash-meta{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.trash-acts{display:flex;gap:6px;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(2px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r16);box-shadow:var(--shadow-lg);width:460px;max-width:95vw;padding:22px;transform:translateY(8px) scale(.98);transition:transform .18s;max-height:92vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-title{font-size:15.5px;font-weight:600;letter-spacing:-.3px;margin-bottom:18px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:13px}
.form-label{font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--text);background:var(--surface);transition:border-color .14s;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:64px;line-height:1.5}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.sel-wrap{position:relative}
.sel-wrap select{width:100%;padding:9px 30px 9px 11px;border:1.5px solid var(--border);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--text);background:var(--surface);appearance:none;cursor:pointer;outline:none;transition:border-color .14s}
.sel-wrap select:focus{border-color:var(--accent)}
.sel-wrap::after{content:"";position:absolute;right:10px;top:50%;transform:translateY(-50%);border:4px solid transparent;border-top-color:var(--text3);pointer-events:none}
.d-modal{width:500px}
.d-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.d-name{font-size:17px;font-weight:600;letter-spacing:-.3px;line-height:1.4;flex:1}
.d-close{width:28px;height:28px;border-radius:var(--r8);border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.d-section{border-top:1px solid var(--border);padding:14px 0}
.d-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:7px}
.d-memo{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;background:var(--surface2);border-radius:var(--r8);padding:11px 13px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.d-item{background:var(--surface2);border-radius:var(--r8);padding:9px 11px}
.d-item-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.d-item-val{font-size:13px;font-weight:500;color:var(--text)}
.s-section{border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-bottom:14px}
.s-title{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);gap:12px}
.s-row:last-child{border-bottom:none}
.s-row-lbl{font-size:13px;font-weight:500}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .14s;flex-shrink:0}
.swatch:hover{transform:scale(1.18)}
.swatch.sel{border-color:var(--text);transform:scale(1.1)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.task-card{animation:slideIn .15s ease both}
</style>
</head>

        <div class="d-item"><div class="d-item-lbl">&#25285;&#24403;&#32773;</div><div class="d-item-val" id="d-asgn">&#8212;</div></div>
        <div class="d-item"><div class="d-item-lbl">&#20778;&#20808;&#24230;</div><div class="d-item-val" id="d-pri">&#8212;</div></div>
        <div class="d-item"><div class="d-item-lbl">&#26399;&#38480;&#26085;</div><div class="d-item-val" id="d-due">&#8212;</div></div>
        <div class="d-item"><div class="d-item-lbl">&#12459;&#12486;&#12468;&#12522;</div><div class="d-item-val" id="d-cat">&#8212;</div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDetail()">&#38281;&#12376;&#12427;</button>
      <button class="btn btn-primary" id="d-edit-btn">&#32232;&#38598;&#12377;&#12427;</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settings-modal" onclick="if(event.target===this)closeSettings()">
  <div class="modal" style="width:480px">
    <div class="modal-title">&#35373;&#23450;</div>
    <div class="s-section">
      <div class="s-title">&#12459;&#12521;&#12540;&#12486;&#12540;&#12510;</div>
      <div class="s-row">
        <div class="s-row-lbl">&#12450;&#12463;&#12475;&#12531;&#12488;&#12459;&#12521;&#12540;</div>
        <div class="swatches" id="accent-swatches"></div>
      </div>
    </div>
    <div class="s-section">
      <div class="s-title">&#12459;&#12486;&#12468;&#12522;&#31649;&#29702;</div>
      <div id="s-cat-list"></div>
      <div style="padding:10px 14px;border-top:1px solid var(--border)">
        <div style="display:flex;gap:7px;align-items:center">
          <input type="text" class="form-input" id="s-cat-nm" placeholder="&#26032;&#12375;&#12356;&#12459;&#12486;&#12468;&#12522;&#21517;" style="flex:1;padding:7px 10px;font-size:13px">
          <div class="sel-wrap" style="width:68px"><select id="s-cat-col" style="padding:7px 26px 7px 9px;font-size:13px"><option value="#3A5EE5">&#128309;</option><option value="#1A7A50">&#128994;</option><option value="#A05C00">&#128993;</option><option value="#C0253A">&#128308;</option><option value="#6B35C8">&#128995;</option></select></div>
          <button class="btn btn-primary btn-sm" onclick="addCatS()">&#36861;&#21152;</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">&#12461;&#12515;&#12531;&#12475;&#12523;</button>
      <button class="btn btn-primary" onclick="applySettings()">&#20445;&#23384;&#12375;&#12390;&#36969;&#29992;</button>
    </div>
  </div>
</div>

<script>
document.body.insertAdjacentHTML("beforeend",`<div id="fb-loading" style="position:fixed;inset:0;background:#F0EFE9;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:sans-serif"><div style="width:32px;height:32px;border:3px solid #E2DFD6;border-top-color:#3A5EE5;border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:13px;color:#5C5A62">&#25509;&#32154;&#20013;...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>`);

const ACCENTS=[{h:"#3A5EE5",l:"&#12502;&#12523;&#12540;"},{h:"#1A7A50",l:"&#12464;&#12522;&#12540;&#12531;"},{h:"#6B35C8",l:"&#12497;&#12540;&#12503;&#12523;"},{h:"#C0253A",l:"&#12524;&#12483;&#12489;"},{h:"#A05C00",l:"&#12450;&#12531;&#12496;&#12540;"},{h:"#0E7490",l:"&#12471;&#12450;&#12531;"},{h:"#BE185D",l:"&#12ԥ12531;&#12463;"},{h:"#374151",l:"&#12464;&#12524;&#12540;"}];

let tasks=[],trash=[],cats=[
  {id:"doc",name:"&#36039;&#26009;&#20316;&#25104;",color:"#3A5EE5"},
  {id:"est",name:"&#35211;&#31309;&#26360;&#20316;&#25104;",color:"#1A7A50"},
  {id:"sf",name:"SF&#30003;&#35531;",color:"#0E7490"},
  {id:"credit",name:"&#19982;&#20449;WF&#30003;&#35531;",color:"#A05C00"},
  {id:"irreg",name:"&#12452;&#12524;&#12�;&#12517;&#12521;&#12540;WF&#30003;&#35531;",color:"#C0253A"},
  {id:"demo",name:"&#12ǳ;&#12514;&#30011;&#38754;&#30330;&#34892;",color:"#6B35C8"},
  {id:"sched",name:"&#26085;&#31243;&#35519;&#25972;",color:"#BE185D"},
];
let cfg={accent:"#3A5EE5"};
let showTrash=false,tmpAccent=cfg.accent;
let colSort={n:"created",m:"created",s:"created"};

function setColSort(col,sort,btn){
  colSort[col]=sort;
  // update active button in this col
  btn.closest(".col-sort-bar").querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderKanban();
}
let _db,_ref,_set,_remove,_onValue;

function fbSet(p,v){if(_db)_set(_ref(_db,p),v);}
function fbRemove(p){if(_db)_remove(_ref(_db,p));}
function saveTaskToFb(t){fbSet("tasks/"+t.id,t);}
function removeTaskFromFb(id){fbRemove("tasks/"+id);}
function saveTrashToFb(t){fbSet("trash/"+t.id,t);}
function removeTrashFromFb(id){fbRemove("trash/"+id);}
function clearAllTrashFb(){fbRemove("trash");}

function todayStr(){return new Date().toISOString().split("T")[0]}
function fmtDue(s,time){
  if(!s)return null;
  const d=new Date(s+"T00:00:00"),t=new Date();t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  let label=diff<0?Math.abs(diff)+"&#26085;&#36229;&#36942;":diff===0?"&#20170;&#26085;":diff===1?"&#26明;&#26085;":d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"});
  if(time)label+=" "+time;
  return{label,cls:diff<0?"overdue":diff===0?"today":""};
}

function refresh(){updateStats();showTrash?renderTrashView():renderKanban();}

function updateStats(){
  document.getElementById("st-total").textContent=tasks.length;
  document.getElementById("st-n").textContent=tasks.filter(t=>t.assignee==="&#20013;&#26449;").length;
  document.getElementById("st-m").textContent=tasks.filter(t=>t.assignee==="&#20013;").length;
  document.getElementById("st-s").textContent=tasks.filter(t=>t.assignee==="&#26707;&#20117;").length;
  document.getElementById("st-high").textContent=tasks.filter(t=>t.priority==="high").length;
  document.getElementById("st-today").textContent=tasks.filter(t=>t.due&&t.due<=todayStr()).length;
  document.getElementById("trash-btn-cnt").textContent=trash.length;
}

function renderKanban(){
  document.getElementById("kanban").style.display="grid";
  const tv=document.getElementById("trash-view-container");if(tv)tv.remove();
  const cols=[{id:"col-n",name:"&#20013;&#26449;",cnt:"cnt-n",sort:"n"},{id:"col-m",name:"&#20013;",cnt:"cnt-m",sort:"m"},{id:"col-s",name:"&#26707;&#20117;",cnt:"cnt-s",sort:"s"}];
  const nameMap={"col-n":"&#20013;&#26449;","col-m":"&#20013;","col-s":"&#26707;&#20117;"};
  const po={high:0,mid:1,low:2,"":3};
  cols.forEach(col=>{
    const el=document.getElementById(col.id);
    let mt=tasks.filter(t=>t.assignee===nameMap[col.id]);
    const s=colSort[col.sort];
    if(s==="priority")mt.sort((a,b)=>(po[a.priority]||3)-(po[b.priority]||3));
    else if(s==="due")mt.sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due);});
    else mt.sort((a,b)=>b.createdAt-a.createdAt);
    document.getElementById(col.cnt).textContent=mt.length;
    if(!mt.length){el.innerHTML='<div class="col-empty">&#12479;&#12473;&#12463;&#12394;&#12375;</div>';return;}
    el.innerHTML=mt.map((t,i)=>taskCard(t,i)).join("");
  });
}

function taskCard(t,i){
  const cat=cats.find(c=>c.id===t.cat);
  const due=t.due?fmtDue(t.due,t.dueTime):null;
  const pb={high:"pb-high",mid:"pb-mid",low:"pb-low","":"pb-none"};
  const pt={high:"tag-ph",mid:"tag-pm",low:"tag-pl"};
  const ptl={high:"&#39640;&#20778;&#20808;&#24230;",mid:"&#20013;&#20778;&#20808;&#24230;",low:"&#20302;&#20778;&#20808;&#24230;"};
  return `<div class="task-card" id="tc-${t.id}" style="animation-delay:${i*15}ms" onclick="openDetail(${t.id})">
    <div class="pri-bar ${pb[t.priority]||"pb-none"}"></div>
    <div class="card-inner">
      <div class="card-top">
        <div class="card-check" id="cb-${t.id}" onclick="event.stopPropagation();completeTask(${t.id})">
          <svg class="ck-svg" viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
        </div>
        <div class="card-name">${esc(t.name)}</div>
      </div>
      ${t.memo?`<div class="card-memo">${esc(t.memo)}</div>`:""}
      <div class="card-tags">
        ${cat?`<span class="tag" style="background:${cat.color}18;color:${cat.color}">${esc(cat.name)}</span>`:""}
        ${t.priority?`<span class="tag ${pt[t.priority]}">${ptl[t.priority]}</span>`:""}
        ${due?`<span class="tag tag-due ${due.cls}">&#128197; ${due.label}</span>`:""}
      </div>
    </div>
    <div class="card-actions">
      <button class="icon-btn" onclick="event.stopPropagation();openEdit(${t.id})">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2.5l2.5 2.5-8 8H3v-2.5l8-8z"/></svg>
      </button>
      <button class="icon-btn del" onclick="event.stopPropagation();sendTrash(${t.id})">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4"/><path d="M7 7v3M9 7v3"/></svg>
      </button>
    </div>
  </div>`;
}

function renderTrashView(){
  document.getElementById("kanban").style.display="none";
  let tv=document.getElementById("trash-view-container");
  if(!tv){tv=document.createElement("div");tv.id="trash-view-container";tv.className="trash-view";document.getElementById("main-content").appendChild(tv);}
  if(!trash.length){tv.innerHTML='<div style="font-size:15px;font-weight:600;margin-bottom:12px">&#12468;&#12511;&#31665;</div><div style="text-align:center;padding:48px;color:var(--text3)">&#12468;&#12511;&#31665;&#12399;&#31354;&#12391;&#12377;</div>';return;}
  tv.innerHTML=`<div style="font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between"><span>&#12468;&#12511;&#31665;&#65288;${trash.length}&#20214;&#65289;</span><button class="btn btn-danger btn-sm" onclick="emptyTrash()">&#12059;&#12409;&#12066;&#23436;&#20840;&#21066;&#38500;</button></div>`+
    trash.map((t,i)=>{
      const cat=cats.find(c=>c.id===t.cat);
      return `<div class="trash-item">
        <div style="flex:1;min-width:0"><div class="trash-name">${esc(t.name)}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:3px">
            ${cat?`<span class="tag" style="background:${cat.color}18;color:${cat.color};font-size:10px">${esc(cat.name)}</span>`:""}
            <span class="trash-meta">${t.deletedAt||""}&#12395;&#31227;&#21205;</span>
          </div>
        </div>
        <div class="trash-acts">
          <button class="btn btn-ghost btn-sm" onclick="restore(${t.id})">&#24489;&#20803;</button>
          <button class="btn btn-danger btn-sm" onclick="permDelete(${t.id})">&#23436;&#20840;&#21066;&#38500;</button>
        </div>
      </div>`;
    }).join("");
}

function toggleTrash(){showTrash=!showTrash;refresh();}

function completeTask(id){
  if(!confirm("&#12053;&#12398;&#12479;&#12473;&#12463;&#12434;&#23436;&#20102;&#12375;&#12390;&#12468;&#12511;&#31665;&#12395;&#31227;&#21205;&#12375;&#12414;&#12377;&#12363;&#65311;"))return;
  const cb=document.getElementById("cb-"+id);const card=document.getElementById("tc-"+id);
  cb.classList.add("checked");
  card.classList.add("completing");
  setTimeout(()=>{const t=tasks.find(t=>t.id===id);if(!t)return;t.deletedAt=new Date().toLocaleDateString("ja-JP");saveTrashToFb(t);removeTaskFromFb(id);},340);
}
function sendTrash(id){
  const card=document.getElementById("tc-"+id);card.classList.add("completing");
  setTimeout(()=>{const t=tasks.find(t=>t.id===id);if(!t)return;t.deletedAt=new Date().toLocaleDateString("ja-JP");saveTrashToFb(t);removeTaskFromFb(id);},340);
}
function restore(id){const t=trash.find(t=>t.id===id);if(!t)return;delete t.deletedAt;saveTaskToFb(t);removeTrashFromFb(id);}
function permDelete(id){removeTrashFromFb(id);}
function emptyTrash(){if(!confirm("&#12468;&#12511;&#31665;&#12434;&#23436;&#20840;&#12395;&#31354;&#12395;&#12375;&#12414;&#12377;&#12363;&#65311;"))return;clearAllTrashFb();}

function openDetail(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const cat=cats.find(c=>c.id===t.cat);
  const due=t.due?fmtDue(t.due,t.dueTime):null;
  const ptMap={high:"&#128308; &#39640;&#20778;&#20808;&#24230;",mid:"&#128993; &#20013;&#20778;&#20808;&#24230;",low:"&#128994; &#20302;&#20778;&#20808;&#24230;"};
  const mc={"&#20013;&#26449;":"#3A5EE5","&#20013;":"#1A7A50","&#26707;&#20117;":"#C0253A"};
  const ac=mc[t.assignee]||"#9B99A4";
  document.getElementById("d-name").textContent=t.name;
  let tags="";
  if(cat)tags+=`<span class="tag" style="background:${cat.color}18;color:${cat.color};font-size:12px">${esc(cat.name)}</span>`;
  if(t.priority)tags+=`<span class="tag ${t.priority==="high"?"tag-ph":t.priority==="mid"?"tag-pm":"tag-pl"}" style="font-size:12px">${ptMap[t.priority]}</span>`;
  if(t.assignee)tags+=`<span class="tag" style="background:${ac}18;color:${ac};font-size:12px">&#128100; ${esc(t.assignee)}</span>`;
  if(due)tags+=`<span class="tag tag-due ${due.cls}" style="font-size:12px">&#128197; ${due.label}</span>`;
  document.getElementById("d-tags").innerHTML=tags;
  const ms=document.getElementById("d-memo-sec");
  if(t.memo){document.getElementById("d-memo").textContent=t.memo;ms.style.display="";}else{ms.style.display="none";}
  document.getElementById("d-asgn").textContent=t.assignee||"&#26410;&#23450;";
  document.getElementById("d-pri").textContent=ptMap[t.priority]||"&#12394;&#12375;";
  document.getElementById("d-due").textContent=due?due.label:"&#26410;&#35373;&#23450;";
  document.getElementById("d-cat").textContent=cat?cat.name:"&#12394;&#12375;";
  document.getElementById("d-edit-btn").onclick=()=>{closeDetail();openEdit(id);};
  document.getElementById("detail-modal").classList.add("open");
}
function closeDetail(){document.getElementById("detail-modal").classList.remove("open");}

function fillCatSel(){document.getElementById("f-cat").innerHTML='<option value="">&#12394;&#12375;</option>'+cats.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");}
function openAddModal(){
  document.getElementById("edit-id").value="";document.getElementById("modal-ttl").textContent="&#12479;&#12473;&#12463;&#12434;&#36861;&#21152;";
  ["f-name","f-memo"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-pri").value="";document.getElementById("f-due").value="";document.getElementById("f-due-time").value="";document.getElementById("f-assignee").value="";
  fillCatSel();document.getElementById("f-cat").value="";
  document.getElementById("task-modal").classList.add("open");setTimeout(()=>document.getElementById("f-name").focus(),180);
}
function openEdit(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById("edit-id").value=id;document.getElementById("modal-ttl").textContent="&#12479;&#12473;&#12463;&#12434;&#32232;&#38598;";
  document.getElementById("f-name").value=t.name;document.getElementById("f-memo").value=t.memo||"";
  document.getElementById("f-pri").value=t.priority||"";document.getElementById("f-due").value=t.due||"";
  document.getElementById("f-due-time").value=t.dueTime||"";document.getElementById("f-assignee").value=t.assignee||"";
  fillCatSel();document.getElementById("f-cat").value=t.cat||"";
  document.getElementById("task-modal").classList.add("open");setTimeout(()=>document.getElementById("f-name").focus(),180);
}
function closeModal(){document.getElementById("task-modal").classList.remove("open");}
function saveTask(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){const el=document.getElementById("f-name");el.style.borderColor="var(--red)";el.focus();setTimeout(()=>el.style.borderColor="",1500);return;}
  const eid=document.getElementById("edit-id").value;
  const data={name,memo:document.getElementById("f-memo").value.trim(),cat:document.getElementById("f-cat").value,priority:document.getElementById("f-pri").value,due:document.getElementById("f-due").value,dueTime:document.getElementById("f-due-time").value,assignee:document.getElementById("f-assignee").value};
  if(eid){const t=tasks.find(t=>t.id==eid);if(t){Object.assign(t,data);saveTaskToFb(t);}}
  else saveTaskToFb({id:Date.now(),createdAt:Date.now(),...data});
  closeModal();
}
document.getElementById("f-name").addEventListener("keydown",e=>{if(e.key==="Enter")saveTask();});

function openSettings(){
  tmpAccent=cfg.accent;
  document.getElementById("accent-swatches").innerHTML=ACCENTS.map(a=>`<div class="swatch ${cfg.accent===a.h?"sel":""}" style="background:${a.h}" onclick="pickAccent('${a.h}',this)"></div>`).join("");
  renderSCatList();document.getElementById("settings-modal").classList.add("open");
}
function closeSettings(){cfg.accent=tmpAccent;applyConfig();document.getElementById("settings-modal").classList.remove("open");}
function renderSCatList(){
  document.getElementById("s-cat-list").innerHTML=cats.map(c=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">
      <span style="width:9px;height:9px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      <span style="flex:1;font-size:13px">${esc(c.name)}</span>
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${tasks.filter(t=>t.cat===c.id).length}&#20214;</span>
      <button class="icon-btn del" onclick="delCatS('${c.id}')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4"/></svg>
      </button>
    </div>`).join("")||`<div style="padding:11px 14px;font-size:12.5px;color:var(--text3)">&#12459;&#12486;&#12468;&#12522;&#12364;&#12354;&#12426;&#12414;&#12379;&#12435;</div>`;
}
function pickAccent(h,el){cfg.accent=h;applyConfig();document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("sel"));el.classList.add("sel");}
function addCatS(){
  const name=document.getElementById("s-cat-nm").value.trim();if(!name)return;
  cats.push({id:"cat_"+Date.now(),name,color:document.getElementById("s-cat-col").value});
  document.getElementById("s-cat-nm").value="";fbSet("cats",cats);renderSCatList();refresh();
}
document.getElementById("s-cat-nm").addEventListener("keydown",e=>{if(e.key==="Enter")addCatS();});
function delCatS(id){
  const cnt=tasks.filter(t=>t.cat===id).length;
  if(cnt>0&&!confirm(`&#12053;&#12398;&#12459;&#12486;&#12468;&#12522;&#12395;&#12399;${cnt}&#20214;&#12398;&#12479;&#12473;&#12463;&#12364;&#12354;&#12426;&#12414;&#12377;&#12290;&#21066;&#38500;&#12375;&#12414;&#12377;&#12363;&#65311;`))return;
  tasks.forEach(t=>{if(t.cat===id){t.cat="";saveTaskToFb(t);}});
  cats=cats.filter(c=>c.id!==id);fbSet("cats",cats);renderSCatList();refresh();
}
function applySettings(){fbSet("cfg",cfg);applyConfig();document.getElementById("settings-modal").classList.remove("open");refresh();}
function applyConfig(){document.documentElement.style.setProperty("--accent",cfg.accent);document.documentElement.style.setProperty("--accent-bg",cfg.accent+"1f");}

document.addEventListener("keydown",e=>{
  const inI=document.activeElement.tagName==="INPUT"||document.activeElement.tagName==="TEXTAREA"||document.activeElement.tagName==="SELECT";
  if(!inI&&(e.key==="n"||e.key==="N"))openAddModal();
  if(e.key==="Escape"){closeModal();closeDetail();closeSettings();}
});
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function initFirebase(){
  _db=window._fb.db;_ref=window._fb.ref;_set=window._fb.set;_remove=window._fb.remove;_onValue=window._fb.onValue;
  _onValue(_ref(_db,"tasks"),snap=>{const val=snap.val();tasks=val?Object.values(val):[];refresh();});
  _onValue(_ref(_db,"trash"),snap=>{const val=snap.val();trash=val?Object.values(val):[];refresh();});
  _onValue(_ref(_db,"cats"),snap=>{
    const val=snap.val();
    if(val&&Array.isArray(val))cats=val;
    else if(val&&typeof val==="object")cats=Object.values(val);
    refresh();
  });
  _onValue(_ref(_db,"cfg"),snap=>{
    const val=snap.val();if(val)cfg=Object.assign(cfg,val);applyConfig();
    document.getElementById("fb-loading").style.display="none";
  });
}
if(window._fbReady)initFirebase();
else window.addEventListener("fb-ready",initFirebase);
<\/script>
</body>
</html>
