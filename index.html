<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいき Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg = {
  apiKey: "AIzaSyC6hDHQhmq7VKoUKaOnDlBQFcscv__HYig",
  authDomain: "taiki-tasks-933cc.firebaseapp.com",
  databaseURL: "https://taiki-tasks-933cc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "taiki-tasks-933cc",
  storageBucket: "taiki-tasks-933cc.firebasestorage.app",
  messagingSenderId: "679381676234",
  appId: "1:679381676234:web:20b54086cd302494c0c433"
};
const app = initializeApp(cfg);
const db = getDatabase(app);
window._fb = { db, ref, set, remove, onValue, get };
window._fbReady = true;
window.dispatchEvent(new Event("fb-ready"));
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EFE9;--surface:#FFF;--surface2:#EFEDE6;
  --border:#E2DFD6;--border2:#C9C6BC;
  --text:#18171A;--text2:#5C5A62;--text3:#9B99A4;
  --accent:#3A5EE5;--accent-bg:#EDF0FC;
  --green:#1A7A50;--green-bg:#E8F5EE;
  --amber:#A05C00;--amber-bg:#FEF4E3;
  --red:#C0253A;--red-bg:#FDEAED;
  --purple:#6B35C8;
  --r8:8px;--r12:12px;--r16:16px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.05);
  --font:"Instrument Sans",sans-serif;--mono:monospace;
  --cn:#3A5EE5;--cm:#1A7A50;--cs:#C0253A;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ===== Auth Screen ===== */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--surface);border-radius:var(--r16);box-shadow:var(--shadow-lg);width:100%;max-width:420px;padding:32px 28px 26px}
.auth-brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
.auth-brand-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.auth-brand-name{font-size:19px;font-weight:600}
.auth-tagline{text-align:center;font-size:12px;color:var(--text3);margin-bottom:28px}
.auth-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:18px}
.user-cards{display:flex;gap:10px;justify-content:center}
.user-card{display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px 10px 14px;border-radius:var(--r12);border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;flex:1}
.user-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.user-card .uav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.user-card .un{font-size:13px;font-weight:600}
.auth-back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);margin-bottom:18px}
.auth-back:hover{color:var(--text2)}
.auth-user-row{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface2);border-radius:var(--r8);margin-bottom:20px}
.auth-user-row .uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.auth-user-row .aname{font-size:14px;font-weight:600}
.auth-user-row .asub{font-size:11px;color:var(--text3);margin-top:2px}
.auth-title{font-size:15px;font-weight:600;margin-bottom:16px}
.auth-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em}
.auth-inp{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--text);background:var(--surface);outline:none;transition:border-color .14s}
.auth-inp:focus{border-color:var(--accent)}
.auth-inp[readonly]{background:var(--surface2);color:var(--text2);cursor:default}
.auth-row{margin-bottom:12px}
.auth-err{font-size:12px;color:var(--red);min-height:18px;margin-top:8px}
.auth-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--r8);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:14px;transition:filter .14s}
.auth-btn:hover{filter:brightness(1.1)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;filter:none}

/* ===== App ===== */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:9px}
.brand-icon{width:28px;height:28px;background:var(--accent);border-radius:var(--r8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.brand-name{font-size:15px;font-weight:600}
.topbar-right{display:flex;gap:8px;align-items:center}
.user-badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r8);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .14s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:none;color:var(--red);border:1px solid #f5c6cc}.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn svg{width:13px;height:13px}
.stats-bar{padding:10px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%}
.num{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--text)}
.sep{width:1px;height:16px;background:var(--border)}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:14px 20px;align-items:start}
.col{background:var(--surface2);border-radius:var(--r16);overflow:hidden;border:1px solid var(--border)}
.col-header{padding:13px 14px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid transparent}
.col-n .col-header{border-color:var(--cn);background:linear-gradient(135deg,#EDF0FC,#f5f7ff)}
.col-m .col-header{border-color:var(--cm);background:linear-gradient(135deg,#E8F5EE,#f0faf4)}
.col-s .col-header{border-color:var(--cs);background:linear-gradient(135deg,#FDEAED,#fff5f6)}
.col-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.col-cnt{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:600}
.col-n .col-cnt{background:#c7d7ff;color:var(--cn)}
.col-m .col-cnt{background:#a7f3d0;color:var(--cm)}
.col-s .col-cnt{background:#fecdd3;color:var(--cs)}
.sort-bar{display:flex;gap:4px;padding:6px 10px 2px}
.sort-btn{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text3);transition:all .12s}
.sort-btn:hover{border-color:var(--border2);color:var(--text2)}
.sort-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.col-body{padding:10px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.empty{padding:24px 10px;text-align:center;color:var(--text3);font-size:12.5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;transition:box-shadow .14s,transform .14s;cursor:pointer;position:relative}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card.done{opacity:0;transform:translateX(16px);transition:all .32s;pointer-events:none}
.pri-bar{height:3px}
.ph{background:var(--red)}.pm{background:var(--amber)}.pl{background:var(--green)}.pn{background:var(--border)}
.card-inner{padding:10px 12px}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:none;cursor:pointer;transition:all .14s}
.check:hover{border-color:var(--green);background:var(--green-bg)}
.check.on{background:var(--green);border-color:var(--green)}
.ck{width:9px;height:9px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.check.on .ck{display:block}
.card-name{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.card-memo{font-size:11.5px;color:var(--text2);margin-bottom:6px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:500}
.tph{background:var(--red-bg);color:var(--red)}.tpm{background:var(--amber-bg);color:var(--amber)}.tpl{background:var(--green-bg);color:var(--green)}
.tdue{background:var(--surface2);color:var(--text2)}.tdue.over{background:var(--red-bg);color:var(--red)}.tdue.today{background:var(--amber-bg);color:var(--amber)}
.card-acts{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .13s}
.card:hover .card-acts{opacity:1}
.ib{width:24px;height:24px;border-radius:var(--r8);border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .12s}
.ib:hover{background:var(--border);color:var(--text2)}
.ib.del:hover{background:var(--red-bg);color:var(--red)}
.ib svg{width:12px;height:12px}
.trash-view{padding:16px 20px}
.ti{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:11px 14px;display:flex;align-items:center;gap:11px;margin-bottom:6px}
.ti-name{flex:1;font-size:13px;color:var(--text2);text-decoration:line-through;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(2px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r16);box-shadow:var(--shadow-lg);width:460px;max-width:95vw;padding:22px;transform:translateY(8px) scale(.98);transition:transform .18s;max-height:92vh;overflow-y:auto}
.overlay.open .modal{transform:none}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:13px}
.lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em}
.inp{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--text);background:var(--surface);outline:none;transition:border-color .14s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:64px;line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.sel-w{position:relative}
.sel-w select{width:100%;padding:9px 28px 9px 11px;border:1.5px solid var(--border);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--text);background:var(--surface);appearance:none;cursor:pointer;outline:none;transition:border-color .14s}
.sel-w select:focus{border-color:var(--accent)}
.sel-w::after{content:"";position:absolute;right:10px;top:50%;transform:translateY(-50%);border:4px solid transparent;border-top-color:var(--text3);pointer-events:none}
.dm{width:500px}
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.dn{font-size:17px;font-weight:600;line-height:1.4;flex:1}
.dc{width:28px;height:28px;border-radius:var(--r8);border:none;background:var(--surface2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.dsec{border-top:1px solid var(--border);padding:14px 0}
.dlbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:7px}
.dmemo{font-size:14px;line-height:1.7;white-space:pre-wrap;background:var(--surface2);border-radius:var(--r8);padding:11px 13px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di{background:var(--surface2);border-radius:var(--r8);padding:9px 11px}
.dilbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.dival{font-size:13px;font-weight:500}
.ss{border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-bottom:14px}
.st{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);gap:12px}
.sr:last-child{border-bottom:none}
.srlbl{font-size:13px;font-weight:500}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .14s}
.sw:hover{transform:scale(1.18)}
.sw.sel{border-color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{animation:si .15s ease both}
</style>
</head>
<body>

<!-- ===== Auth Screen ===== -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="auth-brand-icon">&#10022;</div>
      <div class="auth-brand-name">たいき Tasks</div>
    </div>
    <div class="auth-tagline">チームタスク管理</div>

    <!-- Phase 1: ユーザー選択 -->
    <div id="auth-select">
      <div class="auth-sub">ログインするユーザーを選択してください</div>
      <div class="user-cards">
        <div class="user-card" onclick="authSelectUser('nakamura')">
          <div class="uav" style="background:var(--cn)">中</div>
          <div class="un">中村</div>
        </div>
        <div class="user-card" onclick="authSelectUser('naka')">
          <div class="uav" style="background:var(--cm)">中</div>
          <div class="un">中</div>
        </div>
        <div class="user-card" onclick="authSelectUser('sakurai')">
          <div class="uav" style="background:var(--cs)">櫻</div>
          <div class="un">櫻井</div>
        </div>
      </div>
    </div>

    <!-- Phase 2: パスワードフォーム -->
    <div id="auth-form" style="display:none">
      <button class="auth-back" onclick="authBack()">&#8592; 別のユーザー</button>
      <div class="auth-user-row">
        <div class="uav" id="auth-av" style="background:var(--cn)">中</div>
        <div>
          <div class="aname" id="auth-uname">中村さん</div>
          <div class="asub" id="auth-usub">パスワードを入力してください</div>
        </div>
      </div>
      <div class="auth-title" id="auth-title">ログイン</div>
      <input type="hidden" id="auth-mode">
      <div class="auth-row">
        <label class="auth-lbl">ログインID</label>
        <input type="text" class="auth-inp" id="auth-login-id" placeholder="ログインIDを入力" autocomplete="username">
      </div>
      <div class="auth-row">
        <label class="auth-lbl">パスワード</label>
        <input type="password" class="auth-inp" id="auth-password" placeholder="パスワードを入力" autocomplete="current-password">
      </div>
      <div class="auth-row" id="auth-confirm-row" style="display:none">
        <label class="auth-lbl">パスワード（確認）</label>
        <input type="password" class="auth-inp" id="auth-confirm" placeholder="もう一度入力" autocomplete="new-password">
      </div>
      <div class="auth-err" id="auth-err"></div>
      <button class="auth-btn" id="auth-btn" onclick="authSubmit()">ログイン</button>
    </div>
  </div>
</div>

<!-- ===== Main App（ログイン後に表示） ===== -->
<div id="app" style="display:none">

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">&#10022;</div>
    <div class="brand-name">たいき Tasks</div>
  </div>
  <div class="topbar-right">
    <div id="user-badge" class="user-badge"></div>
    <button class="btn btn-ghost btn-sm" onclick="toggleTrash()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4"/><path d="M7 7v3M9 7v3"/></svg>
      ゴミ箱 <span id="tbtn" style="font-family:monospace;font-size:11px;background:var(--red-bg);color:var(--red);padding:1px 6px;border-radius:20px;margin-left:2px">0</span>
    </button>
    <button class="btn btn-ghost btn-sm" onclick="openSettings()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      設定
    </button>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"/></svg>
      ログアウト
    </button>
    <button class="btn btn-primary" onclick="openAdd()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
      タスクを追加
    </button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="dot" style="background:var(--accent)"></span>合計 <span class="num" id="st0">0</span> 件</div>
  <div class="sep"></div>
  <div class="stat"><span class="dot" style="background:var(--cn)"></span>中村 <span class="num" id="st1">0</span></div>
  <div class="stat"><span class="dot" style="background:var(--cm)"></span>中 <span class="num" id="st2">0</span></div>
  <div class="stat"><span class="dot" style="background:var(--cs)"></span>櫻井 <span class="num" id="st3">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="dot" style="background:var(--red)"></span>高優先度 <span class="num" id="st4">0</span></div>
  <div class="stat"><span class="dot" style="background:var(--amber)"></span>今日期限 <span class="num" id="st5">0</span></div>
</div>

<div id="main">
  <div class="kanban" id="kanban">
    <div class="col col-n">
      <div class="col-header">
        <div class="col-title"><div class="avatar" style="background:var(--cn)">中</div>中村</div>
        <span class="col-cnt" id="cn0">0</span>
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" onclick="setSort('n','created',this)">追加順</button>
        <button class="sort-btn" onclick="setSort('n','priority',this)">優先度順</button>
        <button class="sort-btn" onclick="setSort('n','due',this)">期限順</button>
      </div>
      <div class="col-body" id="cn"></div>
    </div>
    <div class="col col-m">
      <div class="col-header">
        <div class="col-title"><div class="avatar" style="background:var(--cm)">中</div>中</div>
        <span class="col-cnt" id="cm0">0</span>
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" onclick="setSort('m','created',this)">追加順</button>

<script>
// ローディング画面
document.body.insertAdjacentHTML("beforeend","<div id=loading style='position:fixed;inset:0;background:#F0EFE9;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px'><div style='width:32px;height:32px;border:3px solid #E2DFD6;border-top-color:#3A5EE5;border-radius:50%;animation:spin .8s linear infinite'></div><div style='font-size:13px;color:#5C5A62'>接続中...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>");

// ===== AUTH =====
const AUTH_USERS = [
  {key:'nakamura', name:'中村', color:'#3A5EE5', initial:'中'},
  {key:'naka',     name:'中',   color:'#1A7A50', initial:'中'},
  {key:'sakurai',  name:'櫻井', color:'#C0253A', initial:'櫻'}
];
const SESS_KEY      = 'taiki_sess';
const SESS_FRESH    = 7  * 24 * 60 * 60 * 1000; // 7日以内: 自動ログイン
const SESS_REMEMBER = 90 * 24 * 60 * 60 * 1000; // 90日以内: ユーザー記憶で短縮ログイン

let currentUser = null;
let authSelectedUser = null;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}
function genSalt() {
  return [...crypto.getRandomValues(new Uint8Array(16))].map(b => b.toString(16).padStart(2,'0')).join('');
}
function saveSess(key, loginId) {
  localStorage.setItem(SESS_KEY, JSON.stringify({key, loginId, ts: Date.now()}));
}
function loadSess() {
  try { return JSON.parse(localStorage.getItem(SESS_KEY) || 'null'); } catch { return null; }
}

async function checkAuth() {
  const sess = loadSess();
  if (sess && sess.key && sess.loginId) {
    const age = Date.now() - (sess.ts || 0);
    if (age < SESS_FRESH) {
      // 7日以内: Firebase確認して自動ログイン
      try {
        const snap = await window._fb.get(window._fb.ref(window._fb.db, 'auth/' + sess.key));
        const d = snap.val();
        if (d && d.loginId === sess.loginId) {
          currentUser = AUTH_USERS.find(u => u.key === sess.key);
          enterApp();
          return;
        }
      } catch(e) { /* ネットワークエラー時はログイン画面へ */ }
    } else if (age < SESS_REMEMBER) {
      // 7〜90日: ユーザーを記憶して短縮ログイン（パスワードのみ入力）
      authSelectedUser = AUTH_USERS.find(u => u.key === sess.key);
      if (authSelectedUser) {
        showAuthForm(sess.loginId, false);
        document.getElementById('loading').style.display = 'none';
        return;
      }
    }
    localStorage.removeItem(SESS_KEY);
  }
  document.getElementById('loading').style.display = 'none';
}

async function authSelectUser(key) {
  authSelectedUser = AUTH_USERS.find(u => u.key === key);
  const snap = await window._fb.get(window._fb.ref(window._fb.db, 'auth/' + key));
  const d = snap.val();
  showAuthForm(d ? d.loginId : null, !d);
}

function showAuthForm(prefillLoginId, isFirstTime) {
  document.getElementById('auth-select').style.display = 'none';
  document.getElementById('auth-form').style.display   = 'block';
  const u = authSelectedUser;

  document.getElementById('auth-av').style.background = u.color;
  document.getElementById('auth-av').textContent      = u.initial;
  document.getElementById('auth-uname').textContent   = u.name + 'さん';

  const loginIdEl  = document.getElementById('auth-login-id');
  const confirmRow = document.getElementById('auth-confirm-row');
  const btn        = document.getElementById('auth-btn');
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-password').value  = '';
  document.getElementById('auth-confirm').value   = '';

  if (isFirstTime) {
    document.getElementById('auth-title').textContent = '初回パスワード設定';
    document.getElementById('auth-usub').textContent  = 'ログインIDとパスワードを設定してください';
    document.getElementById('auth-mode').value = 'setup';
    loginIdEl.value = '';
    loginIdEl.removeAttribute('readonly');
    confirmRow.style.display = '';
    btn.textContent = '設定して始める';
    setTimeout(() => loginIdEl.focus(), 100);
  } else {
    document.getElementById('auth-title').textContent = 'ログイン';
    document.getElementById('auth-usub').textContent  = 'パスワードを入力してください';
    document.getElementById('auth-mode').value = 'login';
    loginIdEl.value = prefillLoginId || '';
    if (prefillLoginId) {
      loginIdEl.setAttribute('readonly', '');
    } else {
      loginIdEl.removeAttribute('readonly');
    }
    confirmRow.style.display = 'none';
    btn.textContent = 'ログイン';
    setTimeout(() => document.getElementById('auth-password').focus(), 100);
  }
}

function authBack() {
  document.getElementById('auth-form').style.display   = 'none';
  document.getElementById('auth-select').style.display = 'block';
  authSelectedUser = null;
}

async function authSubmit() {
  const mode     = document.getElementById('auth-mode').value;
  const loginId  = document.getElementById('auth-login-id').value.trim();
  const password = document.getElementById('auth-password').value;
  const confirm  = document.getElementById('auth-confirm').value;
  const errEl    = document.getElementById('auth-err');
  const btn      = document.getElementById('auth-btn');
  errEl.textContent = '';

  // バリデーション（非同期処理前）
  if (!loginId)  { errEl.textContent = 'ログインIDを入力してください'; return; }
  if (!password) { errEl.textContent = 'パスワードを入力してください'; return; }
  if (mode === 'setup') {
    if (password.length < 4) { errEl.textContent = 'パスワードは4文字以上で設定してください'; return; }
    if (password !== confirm) { errEl.textContent = 'パスワードが一致しません'; return; }
  }

  btn.disabled = true;
  btn.textContent = '確認中...';

  try {
    if (mode === 'setup') {
      // ログインIDの重複チェック
      const snap = await window._fb.get(window._fb.ref(window._fb.db, 'auth'));
      const all = snap.val() || {};
      for (const [k, v] of Object.entries(all)) {
        if (k !== authSelectedUser.key && v.loginId === loginId) {
          errEl.textContent = 'そのログインIDは既に使用されています'; return;
        }
      }
      const salt = genSalt();
      const hash = await sha256(password + salt);
      await window._fb.set(window._fb.ref(window._fb.db, 'auth/' + authSelectedUser.key), {loginId, hash, salt});
    } else {
      const snap = await window._fb.get(window._fb.ref(window._fb.db, 'auth/' + authSelectedUser.key));
      const d = snap.val();
      if (!d) { errEl.textContent = 'エラーが発生しました'; return; }
      if (d.loginId !== loginId) { errEl.textContent = 'ログインIDまたはパスワードが違います'; return; }
      const hash = await sha256(password + d.salt);
      if (hash !== d.hash) { errEl.textContent = 'ログインIDまたはパスワードが違います'; return; }
    }
    currentUser = authSelectedUser;
    saveSess(currentUser.key, loginId);
    enterApp();
  } catch(e) {
    errEl.textContent = '通信エラーが発生しました。再度お試しください。';
  } finally {
    btn.disabled = false;
    btn.textContent = mode === 'setup' ? '設定して始める' : 'ログイン';
  }
}

function enterApp() {
  document.getElementById('loading').style.display     = 'none';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display         = 'block';
  const badge = document.getElementById('user-badge');
  badge.style.cssText = `background:${currentUser.color}18;color:${currentUser.color}`;
  badge.textContent   = '👤 ' + currentUser.name;
  initFirebaseData();
}

function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  // tsを失効させてユーザー情報は残す（次回の短縮ログイン用）
  const sess = loadSess();
  if (sess) {
    sess.ts = Date.now() - SESS_FRESH - 1000;
    localStorage.setItem(SESS_KEY, JSON.stringify(sess));
  }
  currentUser = null;
  document.getElementById('app').style.display         = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  // 同じユーザーで短縮ログイン画面へ
  if (sess) {
    authSelectedUser = AUTH_USERS.find(u => u.key === sess.key);
    if (authSelectedUser) { showAuthForm(sess.loginId, false); return; }
  }
  document.getElementById('auth-form').style.display   = 'none';
  document.getElementById('auth-select').style.display = 'block';
}

// Enterキー対応
document.addEventListener('keydown', e => {
  if (document.getElementById('auth-screen').style.display !== 'none') {
    if (e.key === 'Enter' && document.getElementById('auth-form').style.display !== 'none') authSubmit();
    return;
  }
  const inInput = ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName);
  if (!inInput && (e.key === 'n' || e.key === 'N')) openAdd();
  if (e.key === 'Escape') { closeModal(); closeDetail(); closeSettings(); }
});

// ===== APP =====
const ACCENTS=["#3A5EE5","#1A7A50","#6B35C8","#C0253A","#A05C00","#0E7490","#BE185D","#374151"];
let tasks=[],trash=[],cats=[
  {id:"doc",name:"資料作成",color:"#3A5EE5"},
  {id:"est",name:"見積書作成",color:"#1A7A50"},
  {id:"sf",name:"SF申請",color:"#0E7490"},
  {id:"credit",name:"与信WF申請",color:"#A05C00"},
  {id:"irreg",name:"イレギュラーWF申請",color:"#C0253A"},
  {id:"demo",name:"デモ画面発行",color:"#6B35C8"},
  {id:"sched",name:"日程調整",color:"#BE185D"},
];
let appCfg={accent:"#3A5EE5"};
let showTrash=false;
let colSort={n:"created",m:"created",s:"created"};
let _db,_ref,_set,_remove,_onValue;

function fbSet(p,v){if(_db)_set(_ref(_db,p),v);}
function fbDel(p){if(_db)_remove(_ref(_db,p));}
window.saveTask=function(t){fbSet("tasks/"+t.id,t);};
function delTask(id){fbDel("tasks/"+id);}
function saveTrash(t){fbSet("trash/"+t.id,t);}
function delTrash(id){fbDel("trash/"+id);}

function today(){return new Date().toISOString().split("T")[0]}
function fmtDue(s,time){
  if(!s)return null;
  const d=new Date(s+"T00:00:00"),t=new Date();t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  let label=diff<0?Math.abs(diff)+"日超過":diff===0?"今日":diff===1?"明日":d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"});
  if(time)label+=" "+time;
  return{label,cls:diff<0?"over":diff===0?"today":""};
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function refresh(){updateStats();showTrash?renderTrash():renderKanban();}
function updateStats(){
  document.getElementById("st0").textContent=tasks.length;
  document.getElementById("st1").textContent=tasks.filter(t=>t.assignee==="中村").length;
  document.getElementById("st2").textContent=tasks.filter(t=>t.assignee==="中").length;
  document.getElementById("st3").textContent=tasks.filter(t=>t.assignee==="櫻井").length;
  document.getElementById("st4").textContent=tasks.filter(t=>t.priority==="high").length;
  document.getElementById("st5").textContent=tasks.filter(t=>t.due&&t.due<=today()).length;
  document.getElementById("tbtn").textContent=trash.length;
}
function setSort(col,sort,btn){
  colSort[col]=sort;
  btn.closest(".sort-bar").querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderKanban();
}
const PO={high:0,mid:1,low:2,"":3};
function sortTasks(list,sort){
  if(sort==="priority")return [...list].sort((a,b)=>(PO[a.priority]||3)-(PO[b.priority]||3));
  if(sort==="due")return [...list].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due);});
  return [...list].sort((a,b)=>b.createdAt-a.createdAt);
}
function renderKanban(){
  document.getElementById("kanban").style.display="grid";
  const tv=document.getElementById("trash-container");if(tv)tv.remove();
  const cols=[{id:"cn",name:"中村",cnt:"cn0",sort:"n"},{id:"cm",name:"中",cnt:"cm0",sort:"m"},{id:"cs",name:"櫻井",cnt:"cs0",sort:"s"}];
  cols.forEach(col=>{
    const el=document.getElementById(col.id);
    const list=sortTasks(tasks.filter(t=>t.assignee===col.name),colSort[col.sort]);
    document.getElementById(col.cnt).textContent=list.length;
    if(!list.length){el.innerHTML='<div class="empty">タスクなし</div>';return;}
    el.innerHTML=list.map((t,i)=>cardHTML(t,i)).join("");
  });
}
function cardHTML(t,i){
  const cat=cats.find(c=>c.id===t.cat);
  const due=t.due?fmtDue(t.due,t.dueTime):null;
  const pb={high:"ph",mid:"pm",low:"pl","":"pn"};
  const pt={high:"tph",mid:"tpm",low:"tpl"};
  const ptl={high:"高優先度",mid:"中優先度",low:"低優先度"};
  return `<div class="card" id="tc${t.id}" style="animation-delay:${i*15}ms" onclick="openDetail(${t.id})">
    <div class="pri-bar ${pb[t.priority]||"pn"}"></div>
    <div class="card-inner">
      <div class="card-top">
        <div class="check" id="ck${t.id}" onclick="event.stopPropagation();complete(${t.id})">
          <svg class="ck" viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
        </div>
        <div class="card-name">${esc(t.name)}</div>
      </div>
      ${t.memo?`<div class="card-memo">${esc(t.memo)}</div>`:""}
      <div class="tags">
        ${cat?`<span class="tag" style="background:${cat.color}18;color:${cat.color}">${esc(cat.name)}</span>`:""}
        ${t.priority?`<span class="tag ${pt[t.priority]}">${ptl[t.priority]}</span>`:""}
        ${due?`<span class="tag tdue ${due.cls}">📅 ${due.label}</span>`:""}
      </div>
    </div>
    <div class="card-acts">
      <button class="ib" onclick="event.stopPropagation();openEdit(${t.id})"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2.5l2.5 2.5-8 8H3v-2.5l8-8z"/></svg></button>
      <button class="ib del" onclick="event.stopPropagation();toTrash(${t.id})"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4"/><path d="M7 7v3M9 7v3"/></svg></button>
    </div>
  </div>`;
}
function renderTrash(){
  document.getElementById("kanban").style.display="none";
  let tc=document.getElementById("trash-container");
  if(!tc){tc=document.createElement("div");tc.id="trash-container";tc.className="trash-view";document.getElementById("main").appendChild(tc);}
  if(!trash.length){tc.innerHTML='<div style="font-size:15px;font-weight:600;margin-bottom:12px">🗑️ ゴミ箱</div><div style="text-align:center;padding:48px;color:var(--text3)">ゴミ箱は空です</div>';return;}
  tc.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:15px;font-weight:600">🗑️ ゴミ箱（${trash.length}件）</span><button class="btn btn-danger btn-sm" onclick="emptyTrash()">すべて完全削除</button></div>`+
    trash.map(t=>{
      const cat=cats.find(c=>c.id===t.cat);
      return `<div class="ti">
        <div style="flex:1;min-width:0"><div class="ti-name">${esc(t.name)}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${cat?cat.name:""}　${t.deletedAt||""}に移動</div></div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="restore(${t.id})">復元</button>
          <button class="btn btn-danger btn-sm" onclick="permDel(${t.id})">完全削除</button>
        </div>
      </div>`;
    }).join("");
}
function toggleTrash(){showTrash=!showTrash;refresh();}
function complete(id){
  if(!confirm("このタスクを完了してゴミ箱に移動しますか？"))return;
  const ck=document.getElementById("ck"+id);const card=document.getElementById("tc"+id);
  ck.classList.add("on");card.classList.add("done");
  setTimeout(()=>{const t=tasks.find(t=>t.id===id);if(!t)return;t.deletedAt=new Date().toLocaleDateString("ja-JP");saveTrash(t);delTask(id);},340);
}
function toTrash(id){
  const card=document.getElementById("tc"+id);card.classList.add("done");
  setTimeout(()=>{const t=tasks.find(t=>t.id===id);if(!t)return;t.deletedAt=new Date().toLocaleDateString("ja-JP");saveTrash(t);delTask(id);},340);
}
function restore(id){const t=trash.find(t=>t.id===id);if(!t)return;delete t.deletedAt;saveTask(t);delTrash(id);}
function permDel(id){delTrash(id);}
function emptyTrash(){if(!confirm("ゴミ箱を完全に空にしますか？"))return;fbDel("trash");}

function openDetail(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const cat=cats.find(c=>c.id===t.cat);
  const due=t.due?fmtDue(t.due,t.dueTime):null;
  const ptMap={high:"🔴 高優先度",mid:"🟡 中優先度",low:"🟢 低優先度"};
  const mc={"中村":"#3A5EE5","中":"#1A7A50","櫻井":"#C0253A"};
  document.getElementById("d-name").textContent=t.name;
  let tags="";
  if(cat)tags+=`<span class="tag" style="background:${cat.color}18;color:${cat.color};font-size:12px">${esc(cat.name)}</span>`;
  if(t.priority)tags+=`<span class="tag ${t.priority==="high"?"tph":t.priority==="mid"?"tpm":"tpl"}" style="font-size:12px">${ptMap[t.priority]}</span>`;
  if(t.assignee)tags+=`<span class="tag" style="background:${(mc[t.assignee]||"#9B99A4")}18;color:${mc[t.assignee]||"#9B99A4"};font-size:12px">👤 ${esc(t.assignee)}</span>`;
  if(due)tags+=`<span class="tag tdue ${due.cls}" style="font-size:12px">📅 ${due.label}</span>`;
  document.getElementById("d-tags").innerHTML=tags;
  const ms=document.getElementById("d-memo-sec");
  if(t.memo){document.getElementById("d-memo").textContent=t.memo;ms.style.display="";}else{ms.style.display="none";}
  document.getElementById("d-a").textContent=t.assignee||"未定";
  document.getElementById("d-p").textContent=ptMap[t.priority]||"なし";
  document.getElementById("d-d").textContent=due?due.label:"未設定";
  document.getElementById("d-c").textContent=cat?cat.name:"なし";
  document.getElementById("d-edit").onclick=()=>{closeDetail();openEdit(id);};
  document.getElementById("detail-modal").classList.add("open");
}
function closeDetail(){document.getElementById("detail-modal").classList.remove("open");}
function fillCats(){document.getElementById("fc").innerHTML='<option value="">なし</option>'+cats.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");}
function openAdd(){
  document.getElementById("eid").value="";document.getElementById("mtitle").textContent="タスクを追加";
  ["fn","fm"].forEach(i=>document.getElementById(i).value="");
  ["fp","fd","ft","fa"].forEach(i=>document.getElementById(i).value="");
  fillCats();document.getElementById("fc").value="";
  document.getElementById("task-modal").classList.add("open");
  setTimeout(()=>document.getElementById("fn").focus(),180);
}
function openEdit(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById("eid").value=id;document.getElementById("mtitle").textContent="タスクを編集";
  document.getElementById("fn").value=t.name;document.getElementById("fm").value=t.memo||"";
  document.getElementById("fp").value=t.priority||"";document.getElementById("fd").value=t.due||"";
  document.getElementById("ft").value=t.dueTime||"";document.getElementById("fa").value=t.assignee||"";
  fillCats();document.getElementById("fc").value=t.cat||"";
  document.getElementById("task-modal").classList.add("open");
  setTimeout(()=>document.getElementById("fn").focus(),180);
}
function closeModal(){document.getElementById("task-modal").classList.remove("open");}
function saveTaskForm(){
  const name=document.getElementById("fn").value.trim();
  if(!name){const el=document.getElementById("fn");el.style.borderColor="var(--red)";el.focus();setTimeout(()=>el.style.borderColor="",1500);return;}
  const eid=document.getElementById("eid").value;
  const data={name,memo:document.getElementById("fm").value.trim(),cat:document.getElementById("fc").value,priority:document.getElementById("fp").value,due:document.getElementById("fd").value,dueTime:document.getElementById("ft").value,assignee:document.getElementById("fa").value};
  if(eid){const t=tasks.find(t=>t.id==eid);if(t){Object.assign(t,data);window.saveTask(t);}}
  else window.saveTask({id:Date.now(),createdAt:Date.now(),...data});
  closeModal();
}
document.getElementById("fn").addEventListener("keydown",e=>{if(e.key==="Enter")saveTaskForm();});
function openSettings(){
  document.getElementById("swatches").innerHTML=ACCENTS.map(a=>`<div class="sw ${appCfg.accent===a?"sel":""}" style="background:${a}" onclick="pickAccent('${a}',this)"></div>`).join("");
  renderCatList();document.getElementById("settings-modal").classList.add("open");
}
function closeSettings(){document.getElementById("settings-modal").classList.remove("open");}
function renderCatList(){
  document.getElementById("catlist").innerHTML=cats.map(c=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">
      <span style="width:9px;height:9px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      <span style="flex:1;font-size:13px">${esc(c.name)}</span>
      <span style="font-size:11px;color:var(--text3);font-family:monospace">${tasks.filter(t=>t.cat===c.id).length}件</span>
      <button class="ib del" onclick="delCat('${c.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4"/></svg></button>
    </div>`).join("")||`<div style="padding:11px 14px;font-size:12.5px;color:var(--text3)">カテゴリがありません</div>`;
}
function pickAccent(h,el){appCfg.accent=h;applyAccent();document.querySelectorAll(".sw").forEach(s=>s.classList.remove("sel"));el.classList.add("sel");}
function addCat(){
  const name=document.getElementById("cnm").value.trim();if(!name)return;
  cats.push({id:"cat_"+Date.now(),name,color:document.getElementById("ccol").value});
  document.getElementById("cnm").value="";fbSet("cats",cats);renderCatList();refresh();
}
document.getElementById("cnm").addEventListener("keydown",e=>{if(e.key==="Enter")addCat();});
function delCat(id){
  const cnt=tasks.filter(t=>t.cat===id).length;
  if(cnt>0&&!confirm(`このカテゴリには${cnt}件のタスクがあります。削除しますか？`))return;
  tasks.forEach(t=>{if(t.cat===id){t.cat="";window.saveTask(t);}});
  cats=cats.filter(c=>c.id!==id);fbSet("cats",cats);renderCatList();refresh();
}
function saveSettings(){fbSet("cfg",appCfg);applyAccent();closeSettings();refresh();}
function applyAccent(){document.documentElement.style.setProperty("--accent",appCfg.accent);document.documentElement.style.setProperty("--accent-bg",appCfg.accent+"1f");}

function initFirebaseData(){
  _onValue(_ref(_db,"tasks"),snap=>{const val=snap.val();tasks=val?Object.values(val):[];refresh();});
  _onValue(_ref(_db,"trash"),snap=>{const val=snap.val();trash=val?Object.values(val):[];refresh();});
  _onValue(_ref(_db,"cats"),snap=>{
    const val=snap.val();
    if(val&&Array.isArray(val))cats=val;
    else if(val&&typeof val==="object")cats=Object.values(val);
    refresh();
  });
  _onValue(_ref(_db,"cfg"),snap=>{
    const val=snap.val();if(val)appCfg=Object.assign(appCfg,val);applyAccent();
  });
}

function initFirebase(){
  _db=window._fb.db;_ref=window._fb.ref;_set=window._fb.set;_remove=window._fb.remove;_onValue=window._fb.onValue;
  checkAuth();
}
if(window._fbReady)initFirebase();
else window.addEventListener("fb-ready",initFirebase);
</script>
</body>
</html>
